# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
reviews:
  profile: "assertive"  # chill to reduce noise
  auto_incremental_review: true
  drafts: false
  high_level_summary: true
  sequence_diagrams: true
  review_details: true
  assess_linked_issues: true
  pre_merge_checks:
    issue_assessment:
      mode: "warning"

knowledge_base:
  linear:
    usage: "enabled"
    team_keys:
      - "CS"
  mcp:
    usage: "enabled"

chat:
  auto_reply: true
  integrations:
    linear:
      usage: "enabled"
